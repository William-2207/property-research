cities: [sydney, melbourne]

price_caps:
  house_suburb_median_max: 1300000
  unit_suburb_median_max: 1200000
  listing_max_price: 1200000

undervalue_min_threshold: 5
undervalue_min_comparables: 4

strategy_weights:
  growth: 0.40
  yield: 0.25
  undervalue: 0.25
  risk: 0.10

growth_score_weights:
  population_growth: 0.20
  income_growth: 0.15
  infra_spend: 0.20
  supply_tightness: 0.15
  price_momentum: 0.15
  clearance_rate_trend: 0.15

yield_score_weights:
  gross_yield_vs_lga: 0.40
  vacancy_rate: 0.35
  rent_growth: 0.25

risk_score_weights:
  da_pipeline: 0.25
  vacancy_trend: 0.20
  overlays: 0.20
  investor_concentration: 0.20
  heritage_overlay: 0.15

station_distance:
  premium_max_m: 400
  good_max_m: 800
  acceptable_max_m: 1200
  penalty_start_m: 800
  penalty_per_200m: 1.5
  penalty_beyond_1200m_flat: 2.0

border_proximity:
  radius_m: 500
  threshold_pct: 15
  discount_factor: 0.3
  discount_cap_pct: 12

comparables:
  primary_radius_m: 400
  expanded_radius_m: 800
  area_tolerance_pct: 20
  months_lookback: 12

apartment_flags:
  strata_levy_pct_threshold: 1.2
  building_age_years_threshold: 20
  single_investor_ownership_pct: 20
  da_pipeline_unit_threshold: 400

vendor_motivation:
  dom_multiplier_threshold: 1.3
  bonus_points: 5

scrape_schedule:
  listings: weekly
  fundamentals: monthly

output_dir: ./outputs
db_path: ./data/property_agent.db

api_keys:
  domain_client_id: ""
  domain_client_secret: ""
  claude_api_key: ""

sydney:
  lga_radius_km: 60
  cbd_lat: -33.8688
  cbd_lon: 151.2093
  gtfs_feed_url: "https://api.transport.nsw.gov.au/v1/gtfs/schedule/sydneytrains"

melbourne:
  lga_radius_km: 60
  cbd_lat: -37.8136
  cbd_lon: 144.9631
  gtfs_feed_url: "https://data.ptv.vic.gov.au/downloads/gtfs.zip"

logging:
  level: INFO
  file: ./data/agent.log
  rotation: "10 MB"
